controller_manager:
  ros__parameters:
    update_rate: 20  # Hz

    diff_controller_alphabot2:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_controller_alphabot2:
  ros__parameters:
    update_rate: 20  # Hz

    base_frame_id: telo

    left_wheel_names: ["lave_koleso_zaves"]
    right_wheel_names: ["prave_koleso_zaves"]
    wheel_separation: 0.088
    wheel_radius: 0.022

    use_stamped_vel: false

    position_feedback: false
    open_loop: true
    enable_odom_tf: false     # pre lidar + rf2o_laser_odometry to vypneme
                              # pri zmene rebuildnut tento balicek!
                              # kontrola: ros2 param get /diff_controller_alphabot2 enable_odom_tf

    #cmd_vel_timeout: 5.0

    linear.x.max_velocity: 15.0
    linear.x.min_velocity: -15.0
    linear.x.max_acceleration: .NAN
    linear.x.max_deceleration: .NAN
    linear.x.max_acceleration_reverse: .NAN
    linear.x.max_deceleration_reverse: .NAN
    linear.x.max_jerk: .NAN
    linear.x.min_jerk: .NAN

    angular.z.max_velocity: 15.0
    angular.z.min_velocity: -15.0
    angular.z.max_acceleration: .NAN
    angular.z.max_deceleration: .NAN
    angular.z.max_acceleration_reverse: .NAN
    angular.z.max_deceleration_reverse: .NAN
    angular.z.max_jerk: .NAN
    angular.z.min_jerk: .NAN


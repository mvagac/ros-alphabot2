slam_toolbox:
  ros__parameters:
    # ROS parameters
    odom_frame: odom
    map_frame: map
    #base_frame: base_footprint
    base_frame: telo
    scan_topic: /scan
    use_map_saver: true
    mode: mapping #localization

    # mapping
    resolution: 0.05          # 5cm per pixel
    max_laser_range: 8.0
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000 # program needs a larger stack size to serialize large maps

    # scan matching
    minimum_travel_distance: 0.1  # update map every 10 cm
    minimum_travel_heading: 0.1   # update map every ~6 degrees

